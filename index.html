<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DANMAKU-TUBE</title>
    <style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background-color: #000;
  }

  #game-container {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
  }

  /* 🌟 YouTubeプレイヤー（最背面: z-index: 1） */
  #youtube-player {
    position: absolute;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    z-index: 1;
    pointer-events: auto;
  }

  /* 🌟 黒い透かしシート（真ん中: z-index: 2） */
  #youtube-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    z-index: 2;
    background-color: rgba(0, 0, 0, 0.6); /* 👈 0.35 に軽減して動画・弾幕を鮮明化 */
    pointer-events: none;
  }

  /* 🌟 ゲームキャンバス（最前面: z-index: 3） */
  #game-container canvas {
    position: absolute !important;
    top: 0;
    left: 0;
    z-index: 3 !important;
    pointer-events: auto !important; /* 🌟【ここを修正】ゲーム操作（マウス・キーボード）を受け取る */
  }
</style>
  </head>
  <body style="margin: 0; padding: 0; background-color: #0f172a; overflow: hidden;">

    <div id="game-container">
      <div id="youtube-player"></div>
      <div id="youtube-overlay"></div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
