<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>弾幕ボス</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: #000;
      }

      /* 🛠️【ここを追加】ゲーム画面（Canvas）を強制的に一番手前に引き上げます！ */
      #game-container canvas {
        position: absolute !important;
        top: 0;
        left: 0;
        z-index: 10 !important; /* YouTube(1)やオーバーレイ(2)より圧倒的に高い数値 */
        pointer-events: auto !important;  /* マウス操作が裏のボタン等に届くようにする魔法のプロパティ */
      }
    </style>
  </head>
  <body>

    <div id="game-container" style="position: relative; width: 100%; height: 100%;">
      
      <div id="youtube-player" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;"></div>
      
      <div id="video-overlay" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none;"></div>
      
      </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
